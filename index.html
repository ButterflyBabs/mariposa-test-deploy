<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mariposa Test Deploy 🦋</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      text-align: center;
    }
    .card {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      padding: 3rem;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    h1 { font-size: 2.5rem; margin-bottom: 0.5rem; }
    p { font-size: 1.2rem; opacity: 0.9; }
    .check { color: #4ade80; font-size: 4rem; }
  </style>
</head>
<body>
  <div class="card">
    <div class="check">✅</div>
    <h1>Deployment Test</h1>
    <p>GitHub + Vercel connected via Mariposa 🦋</p>
    <p style="margin-top:2rem;font-size:1rem;opacity:0.7;">Deployed at <span id="time"></span></p>
  </div>
  <script>document.getElementById('time').textContent = new Date().toLocaleString();</script>
</body>
</html>
