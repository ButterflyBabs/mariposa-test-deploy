<!DOCTYPE html>
<html>
<head>
  <title>OpenClaw Test Deployment</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; text-align: center; }
    h1 { color: #333; }
    .success { color: green; font-size: 24px; }
    .box { background: #f5f5f5; padding: 20px; border-radius: 8px; margin: 20px 0; }
  </style>
</head>
<body>
  <h1>🚀 OpenClaw Deployment Test</h1>
  <p class="success">✅ Deployment Successful!</p>
  <div class="box">
    <p><strong>GitHub:</strong> Connected</p>
    <p><strong>Vercel:</strong> Connected</p>
    <p><strong>Time:</strong> <span id="time"></span></p>
  </div>
  <p>Your deployment pipeline is working correctly.</p>
  <script>document.getElementById('time').textContent = new Date().toLocaleString();</script>
</body>
</html>
